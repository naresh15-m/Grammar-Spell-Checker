<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Results - Grammar & Spell Checker</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h3><i class="fas fa-check-double"></i> Check Results</h3>
                    </div>
                    <div class="card-body">
                        <!-- Statistics Cards -->
                        <div class="row mb-4">
                            <div class="col-md-3">
                                <div class="stat-card bg-light p-3 rounded text-center">
                                    <h5>Total Words</h5>
                                    <h2 id="totalWords">0</h2>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stat-card bg-light p-3 rounded text-center">
                                    <h5>Total Errors</h5>
                                    <h2 id="totalErrors">0</h2>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stat-card bg-light p-3 rounded text-center">
                                    <h5>Spelling Errors</h5>
                                    <h2 id="spellingErrors">0</h2>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stat-card bg-light p-3 rounded text-center">
                                    <h5>Grammar Errors</h5>
                                    <h2 id="grammarErrors">0</h2>
                                </div>
                            </div>
                        </div>

                        <!-- Original Text -->
                        <div class="mb-4">
                            <h5>Original Text:</h5>
                            <div class="border p-3 bg-light" id="originalText"></div>
                        </div>

                        <!-- Corrected Text -->
                        <div class="mb-4">
                            <h5>Corrected Text:</h5>
                            <div class="border p-3 bg-success bg-opacity-10" id="correctedText"></div>
                        </div>

                        <!-- Error List -->
                        <div class="mb-4">
                            <h5>Errors Found:</h5>
                            <div class="table-responsive">
                                <table class="table table-bordered" id="errorsTable">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Original</th>
                                            <th>Corrected</th>
                                            <th>Type</th>
                                        </tr>
                                    </thead>
                                    <tbody id="errorsList"></tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Back Button -->
                        <a href="/" class="btn btn-primary">
                            <i class="fas fa-arrow-left"></i> Check Another Text
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load results from localStorage
        const results = JSON.parse(localStorage.getItem('checkResults'));
        
        if (results) {
            document.getElementById('totalWords').textContent = results.statistics.total_words;
            document.getElementById('totalErrors').textContent = results.statistics.total_errors;
            document.getElementById('spellingErrors').textContent = results.statistics.spelling_errors;
            document.getElementById('grammarErrors').textContent = results.statistics.grammar_errors;
            document.getElementById('originalText').textContent = results.original_text;
            document.getElementById('correctedText').textContent = results.corrected_text;
            
            const errorsList = document.getElementById('errorsList');
            results.errors.forEach(error => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${error.original}</td>
                    <td class="text-success fw-bold">${error.corrected}</td>
                    <td><span class="badge ${error.type === 'spelling' ? 'bg-warning' : 'bg-info'}">${error.type}</span></td>
                `;
                errorsList.appendChild(row);
            });
            
            // Clear localStorage after loading
            localStorage.removeItem('checkResults');
        } else {
            window.location.href = '/';
        }
    </script>
</body>
</html>
